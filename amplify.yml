version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Inject all environment variables at build time
        - echo "DATABASE_URL=$DATABASE_URL" >> .env
        - echo "DIRECT_URL=$DIRECT_URL" >> .env
        - echo "NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL" >> .env
        - echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" >> .env
        - echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY" >> .env
        - echo "NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL" >> .env
        - echo "BETTER_AUTH_URL=$BETTER_AUTH_URL" >> .env
        - echo "BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET" >> .env
        - echo "JWT_SECRET=$JWT_SECRET" >> .env
        - echo "NODE_ENV=$NODE_ENV" >> .env
        - echo "SEED_ADMIN_ON_BOOT=$SEED_ADMIN_ON_BOOT" >> .env
        - echo "ADMIN_EMAIL=$ADMIN_EMAIL" >> .env
        - echo "ADMIN_PASSWORD=$ADMIN_PASSWORD" >> .env
        - echo "ADMIN_FIRST_NAME=$ADMIN_FIRST_NAME" >> .env
        - echo "ADMIN_LAST_NAME=$ADMIN_LAST_NAME" >> .env
        - echo "NEXT_PUBLIC_TERM_STAFF_SINGULAR=$NEXT_PUBLIC_TERM_STAFF_SINGULAR" >> .env
        - echo "NEXT_PUBLIC_TERM_STAFF_PLURAL=$NEXT_PUBLIC_TERM_STAFF_PLURAL" >> .env
        - echo "NEXT_PUBLIC_TERM_EVENT_SINGULAR=$NEXT_PUBLIC_TERM_EVENT_SINGULAR" >> .env
        - echo "NEXT_PUBLIC_TERM_EVENT_PLURAL=$NEXT_PUBLIC_TERM_EVENT_PLURAL" >> .env
        - echo "SMTP_HOST=$SMTP_HOST" >> .env
        - echo "SMTP_PORT=$SMTP_PORT" >> .env
        - echo "SMTP_USER=$SMTP_USER" >> .env
        - echo "SMTP_PASS=$SMTP_PASS" >> .env
        - echo "SMTP_SECURE=$SMTP_SECURE" >> .env
        - echo "EMAIL_FROM=$EMAIL_FROM" >> .env
        - echo "RESEND_API_KEY=$RESEND_API_KEY" >> .env
        - echo "NEXT_PUBLIC_MAPBOX_TOKEN=$NEXT_PUBLIC_MAPBOX_TOKEN" >> .env

        # Run database migrations and build
        - npx prisma generate
        - npx prisma migrate resolve --applied 20260317_add_time_entry_revisions || true
        - npx prisma migrate deploy
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
